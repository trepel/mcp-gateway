# This policy is a combination of
# - ./mcps-auth-policy.yaml
# - config/samples/oauth-token-exchange/tools-list-auth.yaml
apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: mcp-merged-auth-policy
  namespace: gateway-system
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: mcp-gateway
    sectionName: mcp-tls
  rules:
    authentication:
      'keycloak':
        jwt:
          issuerUrl: https://keycloak.127-0-0-1.sslip.io:8002/realms/mcp
        when:
          - predicate: "!request.path.contains('/.well-known')"
          - predicate: "!request.headers.exists(h, h == 'router-key')"
    authorization:
      'allow-mcp-method':
        when:
          - predicate: "!request.path.contains('/.well-known')"
          - predicate: "!request.headers.exists(h, h == 'x-mcp-toolname')"
          - predicate: "!request.headers.exists(h, h == 'x-mcp-promptname')"
        patternMatching:
          patterns:
          - predicate: |
              !request.headers.exists(h, h == 'x-mcp-method') || (request.headers['x-mcp-method'] in ["tools/list","prompts/list","initialize","notifications/initialized"])
      'authorized-capabilities':
        opa:
          rego: |
            allow = true
            capabilities = {
              "tools": { server: tools |
                server := object.keys(input.auth.identity.resource_access)[_]
                tools := [substring(r, count("tool:"), -1) |
                  r := input.auth.identity.resource_access[server].roles[_]
                  startswith(r, "tool:")
                ]
              },
              "prompts": { server: prompts |
                server := object.keys(input.auth.identity.resource_access)[_]
                prompts := [substring(r, count("prompt:"), -1) |
                  r := input.auth.identity.resource_access[server].roles[_]
                  startswith(r, "prompt:")
                ]
              }
            }
          allValues: true
      'tool-access-check':
        when:
          - predicate: "!request.headers.exists(h, h == 'router-key')"
          - predicate: "request.headers.exists(h, h == 'x-mcp-toolname')"
        patternMatching:
          patterns:
            - predicate: |
                ('tool:' + request.headers['x-mcp-toolname']) in (has(auth.identity.resource_access) && auth.identity.resource_access.exists(p, p == request.headers['x-mcp-servername']) ? auth.identity.resource_access[request.headers['x-mcp-servername']].roles : [])
      'prompt-access-check':
        when:
          - predicate: "!request.headers.exists(h, h == 'router-key')"
          - predicate: "request.headers.exists(h, h == 'x-mcp-promptname')"
        patternMatching:
          patterns:
            - predicate: |
                ('prompt:' + request.headers['x-mcp-promptname']) in (has(auth.identity.resource_access) && auth.identity.resource_access.exists(p, p == request.headers['x-mcp-servername']) ? auth.identity.resource_access[request.headers['x-mcp-servername']].roles : [])
    response:
      success:
        headers:
          x-mcp-authorized:
            wristband:
              issuer: 'authorino'
              customClaims:
                'allowed-capabilities':
                  selector: auth.authorization.authorized-capabilities.capabilities.@tostr
              tokenDuration: 300
              signingKeyRefs:
                - name: trusted-headers-private-key
                  algorithm: ES256
      unauthenticated:
        headers:
          'WWW-Authenticate':
            value: Bearer resource_metadata=http://mcp.127-0-0-1.sslip.io:8001/.well-known/oauth-protected-resource/mcp
        body:
          value: |
            {
              "error": "Unauthorized",
              "message": "Authentication required."
            }
      unauthorized:
        code: 401
        headers:
          'WWW-Authenticate':
            value: Bearer resource_metadata=http://mcp.127-0-0-1.sslip.io:8001/.well-known/oauth-protected-resource/mcp
        body:
          value: |
            {
              "error": "Forbidden",
              "message": "Access denied."
            }

