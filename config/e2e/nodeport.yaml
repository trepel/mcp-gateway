# nodePort values pinned inside the k8s static subrange (30000-30085, KEP-3668)
# so dynamic allocations (e.g. istio-generated per-gateway loadbalancer services)
# will not draw them first. must match extraPortMappings in config/kind/cluster*.yaml.
---
apiVersion: v1
kind: Service
metadata:
  labels:
    gateway.istio.io/managed: istio.io-gateway-controller
    gateway.networking.k8s.io/gateway-name: e2e-1
    istio.io/dataplane-mode: none
  name: e2e-1-np
  namespace: gateway-system
spec:
  externalTrafficPolicy: Cluster
  internalTrafficPolicy: Cluster
  ports:
    - appProtocol: http
      name: mcp
      nodePort: 30072
      port: 8080
      protocol: TCP
      targetPort: 8080
  selector:
    gateway.networking.k8s.io/gateway-name: e2e-1
  sessionAffinity: None
  type: NodePort
---
apiVersion: v1
kind: Service
metadata:
  labels:
    gateway.istio.io/managed: istio.io-gateway-controller
    gateway.networking.k8s.io/gateway-name: e2e-2
    istio.io/dataplane-mode: none
  name: e2e-2-np
  namespace: gateway-system
spec:
  externalTrafficPolicy: Cluster
  internalTrafficPolicy: Cluster
  ports:
    - appProtocol: http
      name: mcp
      nodePort: 30071
      port: 8080
      protocol: TCP
      targetPort: 8080
  selector:
    gateway.networking.k8s.io/gateway-name: e2e-2
  sessionAffinity: None
  type: NodePort
---
