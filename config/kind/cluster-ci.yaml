# Kind cluster configuration for CI environments
# This is a minimal config without Keycloak/OIDC for faster CI setup
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
  kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "ingress-ready=true"
  - |
    apiVersion: kubelet.config.k8s.io/v1beta1
    kind: KubeletConfiguration
    syncFrequency: "10s"
  # containerPorts are pinned nodePort values; keep inside 30000-30085 (k8s static
  # subrange, KEP-3668) so dynamic nodePort allocation will not collide with them
  extraPortMappings:
  - containerPort: 30080 # mcp-gateway (standard)
    hostPort: 8001
    protocol: TCP
  - containerPort: 30081 # keycloak
    hostPort: 8002
    protocol: TCP
  - containerPort: 30082 # mcp-gateway HTTPS
    hostPort: 8009
    protocol: TCP
  - containerPort: 30071 # e2e-2 gateway
    hostPort: 8003
    protocol: TCP
  - containerPort: 30072 # e2e-1 gateway
    hostPort: 8004
    protocol: TCP
  - containerPort: 30073 # shared-gateway team-a
    hostPort: 8005
    protocol: TCP
  - containerPort: 30074 # shared-gateway team-b
    hostPort: 8006
    protocol: TCP
  - containerPort: 30077 # e2e-elicitation gateway
    hostPort: 8010
    protocol: TCP
