kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
  extraMounts:
  - hostPath: ./out/certs/ca.crt
    containerPath: /etc/kubernetes/pki/keycloak-ca.crt
    readOnly: true
  kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "ingress-ready=true"
  - |
    apiVersion: kubelet.config.k8s.io/v1beta1
    kind: KubeletConfiguration
    syncFrequency: "10s"
  - |
    kind: ClusterConfiguration
    apiServer:
      extraArgs:
        oidc-issuer-url: https://keycloak.127-0-0-1.sslip.io:8002/realms/mcp
        oidc-client-id: mcp-test/kubernetes-mcp-server
        oidc-username-claim: preferred_username
        oidc-groups-claim: groups
        oidc-ca-file: /etc/kubernetes/pki/keycloak-ca.crt
  # containerPorts are pinned nodePort values; keep inside 30000-30085 (k8s static
  # subrange, KEP-3668) so dynamic nodePort allocation will not collide with them
  extraPortMappings:
  - containerPort: 30080 # mcp-gateway (standard)
    hostPort: 8001
    protocol: TCP
  - containerPort: 30081 # keycloak port
    hostPort: 8002
    protocol: TCP
  - containerPort: 30082 # mcp-gateway HTTPS
    hostPort: 8009
    protocol: TCP
  - containerPort: 30071 # e2e-2 gateway
    hostPort: 8003
    protocol: TCP
  - containerPort: 30072 # e2e-1 gateway
    hostPort: 8004
    protocol: TCP
  - containerPort: 30073 # shared-gateway team-a
    hostPort: 8005
    protocol: TCP
  - containerPort: 30074 # shared-gateway team-b
    hostPort: 8006
    protocol: TCP
  - containerPort: 30075 # demo team-a
    hostPort: 8007
    protocol: TCP
  - containerPort: 30076 # demo team-b
    hostPort: 8008
    protocol: TCP
  - containerPort: 30077 # e2e-elicitation gateway
    hostPort: 8010
    protocol: TCP
