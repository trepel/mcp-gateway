name: MCP Conformance Tests

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'examples/**'
      - 'LICENSE'
      - 'charts/**'
      - '.coderabbit.yaml'
      - '.gitignore'
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'examples/**'
      - 'LICENSE'
      - 'charts/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CONFORMANCE_VERSION: "0.1.15"
  MCP_URL: "http://mcp.127-0-0-1.sslip.io:8001/mcp"

jobs:
  conformance-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      # probe the baked CI node image (content-hash of version pins); on a
      # miss fall back to stock kindest/node via the default in kind.mk
      - name: Probe baked CI node image
        id: ci-node
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: |
          hit=false
          if image="$(make -s print-ci-node-image 2>/dev/null)"; then
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin >/dev/null 2>&1 || true
            if docker manifest inspect "$image" >/dev/null 2>&1; then
              hit=true
            fi
          else
            image=""
            echo "could not compute baked CI node image ref, using stock kindest/node"
          fi
          {
            echo "hit=$hit"
            echo "image=$image"
          } >> "$GITHUB_OUTPUT"
          echo "baked CI node image: $image (hit=$hit)"

      # create with the pinned bin/kind and node image so the make load
      # targets (same bin/kind) can always load into the node's containerd
      - name: Create Kind cluster
        run: |
          if [ "${{ steps.ci-node.outputs.hit }}" = "true" ]; then
            make kind-create-cluster-ci KIND_CLUSTER_IMAGE="${{ steps.ci-node.outputs.image }}"
          else
            make kind-create-cluster-ci
          fi

      - name: Setup CI environment
        run: |
          make ci-setup
          kubectl apply -k config/mcp-gateway/base/ -n mcp-system

      - name: Deploy conformance server
        run: make deploy-conformance-server


      - name: Wait for conformance server to get ready
        run: |
          echo "Waiting for Gateway to wire up the MCP routes and broker to fetch tools..."
          # wait for the gateway route to be active (non-502/503)
          for i in {1..30}; do
            HTTP_STATUS=$(curl --max-time 2 -s -o /dev/null -w "%{http_code}" "${{ env.MCP_URL }}" 2>/dev/null || true)
            HTTP_STATUS=${HTTP_STATUS:-000}
            if [[ "$HTTP_STATUS" != "000" && "$HTTP_STATUS" != "0" && "$HTTP_STATUS" != "502" && "$HTTP_STATUS" != "503" ]]; then
              echo "Gateway route is active! HTTP Status: $HTTP_STATUS"
              break
            fi
            echo "Attempt $i/30: Gateway route not ready yet (Status: $HTTP_STATUS). Retrying in 2 seconds..."
            sleep 2
            if [ $i -eq 30 ]; then
              echo "ERROR: Gateway routes failed to propagate after 60 seconds."
              exit 1
            fi
          done
          # poll the broker /status endpoint until the conformance server has tools.
          # the controller writes config on Ready, but the broker needs kubelet
          # volume sync + upstream connection before tools are available.
          echo "Waiting for broker to discover conformance server tools..."
          STATUS_URL="${MCP_URL%/mcp}/status"
          for i in {1..60}; do
            TOOLS=$(curl --max-time 5 -s "$STATUS_URL" | jq '[.servers[] | select(.name | contains("conformance")) | .totalTools] | add // 0')
            if [ -n "$TOOLS" ] && [ "$TOOLS" -gt 0 ] 2>/dev/null; then
              echo "Broker has $TOOLS tools from conformance server."
              break
            fi
            sleep 2
            if [ $i -eq 60 ]; then
              echo "ERROR: Broker failed to discover tools after 120 seconds."
              curl -s "$STATUS_URL" || true
              exit 1
            fi
          done

      - name: Run MCP conformance tests
        run: |
          SCENARIOS=(
            server-initialize
            tools-list
            ping
            tools-call-simple-text
            tools-call-image
            tools-call-audio
            tools-call-embedded-resource
            tools-call-mixed-content
            tools-call-error
            tools-call-with-progress
          )
          for scenario in "${SCENARIOS[@]}"; do
            echo "=== Running scenario: $scenario ==="
            npx @modelcontextprotocol/conformance@${CONFORMANCE_VERSION} server \
              --url ${MCP_URL} \
              --scenario "$scenario"
          done

      - name: Collect logs on failure
        if: failure()
        run: |
          make ci-debug-logs
          echo "=== Broker/Router logs ==="
          kubectl logs -n mcp-system -l app.kubernetes.io/name=mcp-gateway --tail=200 || true
          echo "=== Conformance server logs ==="
          kubectl logs -n mcp-test deployment/conformance-server --tail=50
          echo "=== Envoy access logs ==="
          kubectl logs -n gateway-system -l app=mcp-gateway-istio --tail=100 | grep -i "mcp\|POST\|status" || true
