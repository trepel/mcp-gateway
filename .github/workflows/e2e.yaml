name: E2E Tests

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'examples/**'
      - 'LICENSE'
      - 'charts/**'
      - '.coderabbit.yaml'
      - '.gitignore'
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'examples/**'
      - 'LICENSE'
      - 'charts/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Create Kind cluster
        run: kind create cluster --name mcp-gateway --config config/kind/cluster-ci.yaml

      - name: Setup CI environment
        run: make ci-setup

      - name: Run E2E tests
        env:
          GITHUB_MCP_PAT: ${{ secrets.GITHUB_MCP_PAT }}
        run: make test-e2e-ci

      - name: Collect logs on failure
        if: failure()
        run: |
          make ci-debug-logs
          make ci-debug-test-servers-logs
