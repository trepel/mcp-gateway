name: Issue Triage

on:
  issues:
    types:
      [opened, reopened, edited, labeled, unlabeled, milestoned, demilestoned, closed]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number }}

jobs:
  triage:
    if: github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Triage issue
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c37999e00 # v8.0.0
        with:
          script: |
            // ------------------------------------------------------
            // Vars
            // ------------------------------------------------------

            const issue = context.payload.issue;
            const issueNumber = issue.number;
            const hasMilestone = !!issue.milestone;
            const currentLabels = issue.labels.map(label => label.name);
            let action = context.payload.action;
            const eventLabel = context.payload.label ? context.payload.label.name : null;

            // ------------------------------------------------------
            // Helper Functions
            // ------------------------------------------------------

            const hasLabelStartingWith = (prefix) => {
              return currentLabels.some(label => label.startsWith(prefix));
            };

            const getLabelsStartingWith = (prefix) => {
              return currentLabels.filter(label => label.startsWith(prefix));
            };

            // ------------------------------------------------------
            // Setup
            // ------------------------------------------------------

            console.log(`Processing issue #${issueNumber}`);
            console.log(`Action: ${action}`);
            console.log(`Has milestone: ${hasMilestone}`);
            console.log(`Current labels: ${currentLabels.join(', ')}`);

            const labelsToAdd = [];
            const labelsToRemove = [];

            // ------------------------------------------------------
            // Apply Rules
            // ------------------------------------------------------

            // Rule: Enforce single priority label
            // When a new priority/* label is added, remove all other priority labels.
            if (action === 'labeled' && eventLabel && eventLabel.startsWith('priority/')) {
              const priorityLabels = getLabelsStartingWith('priority/');
              priorityLabels.forEach(label => {
                if (label !== eventLabel) {
                  labelsToRemove.push(label);
                  console.log(`New priority added -> removing existing priority ${label}`);
                }
              });
            }

            // Rule: Triage Declined -> Auto-close
            // If an issue is labeled 'triage/declined', close it as 'not_planned'.
            if (action === 'labeled' && eventLabel === 'triage/declined' && issue.state === 'open') {
              console.log('Issue marked as declined -> closing');
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                state: 'closed',
                state_reason: 'not_planned'
              });
              
              // Queue stale labels for removal
              getLabelsStartingWith('triage/').forEach(label => {
                if (label !== 'triage/declined') {
                  labelsToRemove.push(label);
                  console.log(`Issue declined -> removing stale label ${label}`);
                }
              });
              getLabelsStartingWith('priority/').forEach(label => {
                labelsToRemove.push(label);
                console.log(`Issue declined -> removing stale label ${label}`);
              });
              
              // Prevent milestone logic from running
              action = 'closed';
            }


            // Rule: Milestone-based triage
            // Skip milestone-based triage rules for closed events to avoid label mutation.
            if (action !== 'closed') {
              if (!hasMilestone) {
                // 1. If an issue has no milestone:
                
                // a. Remove 'triage/accepted' (e.g., milestone was removed)
                if (currentLabels.includes('triage/accepted')) {
                  labelsToRemove.push('triage/accepted');
                  console.log('No milestone -> removing triage/accepted');
                }

                // b. Remove all priority labels
                const priorityLabels = getLabelsStartingWith('priority/');
                priorityLabels.forEach(label => {
                  if (!labelsToRemove.includes(label)) {
                    labelsToRemove.push(label);
                    console.log(`No milestone -> removing ${label}`);
                  }
                });

                // c. Ensure 'triage/needs-triage' label (unless another triage label exists)
                // accounting for triage/accepted being removed above
                const remainingTriageLabels = currentLabels.filter(l =>
                  l.startsWith('triage/') &&
                  l !== 'triage/accepted' &&
                  l !== 'triage/needs-triage' &&
                  !labelsToRemove.includes(l)
                );

                if (remainingTriageLabels.length === 0) {
                  if (!labelsToAdd.includes('triage/needs-triage')) {
                    labelsToAdd.push('triage/needs-triage');
                    console.log('No milestone and no triage label -> adding triage/needs-triage');
                  }
                } else if (currentLabels.includes('triage/needs-triage')) {
                  // if another triage label exists, remove 'triage/needs-triage'
                  if (!labelsToRemove.includes('triage/needs-triage')) {
                    labelsToRemove.push('triage/needs-triage');
                    console.log('Other triage label found -> removing triage/needs-triage');
                  }
                }

              } else {
                // 2. If an issue has a milestone:

                // a. Ensure 'triage/accepted'
                if (!currentLabels.includes('triage/accepted')) {
                  labelsToAdd.push('triage/accepted');
                  console.log('Has milestone but missing triage/accepted -> adding it');
                }

                // b. Remove all other triage labels
                const triageLabels = getLabelsStartingWith('triage/');
                triageLabels.forEach(label => {
                  if (label !== 'triage/accepted') {
                    if (!labelsToRemove.includes(label)) {
                      labelsToRemove.push(label);
                      console.log(`Has milestone -> removing ${label}`);
                    }
                  }
                });

                // c. Ensure priority/normal if no priority exists
                if (!hasLabelStartingWith('priority/')) {
                  labelsToAdd.push('priority/normal');
                  console.log('Has milestone but no priority label -> adding priority/normal');
                }
              }
            }

            // ------------------------------------------------------
            // Apply Changes
            // ------------------------------------------------------

            // Filter out labels that are both added and removed
            const finalLabelsToAdd = labelsToAdd.filter(l => !labelsToRemove.includes(l));

            if (finalLabelsToAdd.length > 0) {
              console.log(`Adding labels: ${finalLabelsToAdd.join(', ')}`);
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: finalLabelsToAdd
              });
            }

            for (const label of labelsToRemove) {
              console.log(`Removing label: ${label}`);
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  name: label
                });
              } catch (error) {
                if (error.status === 404) {
                  console.log(`Label ${label} not found (may have been already removed)`);
                } else {
                  throw error;
                }
              }
            }

            if (finalLabelsToAdd.length === 0 && labelsToRemove.length === 0) {
              console.log('No label changes needed');
            }
