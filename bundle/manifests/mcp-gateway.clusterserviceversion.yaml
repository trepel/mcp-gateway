apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: "[\n  {\n    \"apiVersion\": \"mcp.kuadrant.io/v1alpha1\",\n    \"kind\": \"MCPGatewayExtension\",\n    \"metadata\": {\n      \"name\": \"mcp-gateway-extension\",\n      \"namespace\": \"mcp-system\"\n    },\n    \"spec\": {\n      \"targetRef\": {\n        \"group\": \"gateway.networking.k8s.io\",\n        \"kind\": \"Gateway\",\n        \"name\": \"mcp-gateway\",\n        \"namespace\": \"gateway-system\",\n        \"sectionName\": \"mcp\"\n      }\n    }\n  },\n  {\n    \"apiVersion\": \"mcp.kuadrant.io/v1alpha1\",\n    \"kind\": \"MCPServerRegistration\",\n    \"metadata\": {\n      \"name\": \"example-server\",\n      \"namespace\": \"mcp-test\"\n    },\n    \"spec\": {\n      \"toolPrefix\": \"example_\",\n      \"targetRef\": {\n        \"group\": \"gateway.networking.k8s.io\",\n        \"kind\": \"HTTPRoute\",\n        \"name\": \"example-route\"\n      }\n    }\n  },\n  {\n    \"apiVersion\": \"mcp.kuadrant.io/v1alpha1\",\n    \"kind\": \"MCPVirtualServer\",\n    \"metadata\": {\n      \"name\": \"example-vs\",\n      \"namespace\": \"default\"\n    },\n    \"spec\": {\n      \"description\": \"example virtual server\",\n      \"tools\": [\n        \"server1_tool1\",\n        \"server2_tool2\"\n      ]\n    }\n  }\n]"
    capabilities: Basic Install
    categories: Integration & Delivery
    containerImage: ghcr.io/kuadrant/mcp-controller:latest
    createdAt: "2026-04-10T09:45:58Z"
    description: An Envoy-based gateway for Model Context Protocol (MCP) servers
    operators.operatorframework.io/builder: operator-sdk-v1.38.0
    operators.operatorframework.io/project_layout: go.kubebuilder.io/v4
    repository: https://github.com/Kuadrant/mcp-gateway
    support: kuadrant
  name: mcp-gateway.v0.0.0
  namespace: placeholder
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
      - description: Extends a Gateway API Gateway to handle MCP traffic by deploying a broker-router and configuring Envoy.
        displayName: MCP Gateway Extension
        kind: MCPGatewayExtension
        name: mcpgatewayextensions.mcp.kuadrant.io
        version: v1alpha1
      - description: Registers an upstream MCP server for tool federation through the gateway.
        displayName: MCP Server Registration
        kind: MCPServerRegistration
        name: mcpserverregistrations.mcp.kuadrant.io
        version: v1alpha1
      - description: Defines a virtual MCP server that exposes a curated subset of tools from registered servers.
        displayName: MCP Virtual Server
        kind: MCPVirtualServer
        name: mcpvirtualservers.mcp.kuadrant.io
        version: v1alpha1
  description: |-
    MCP Gateway is an Envoy-based gateway for Model Context Protocol (MCP) servers.
    It federates tools from multiple upstream MCP servers behind a single gateway endpoint,
    providing authentication, authorization, and routing through Envoy.

    The controller watches MCPGatewayExtension, MCPServerRegistration, and MCPVirtualServer
    custom resources to dynamically configure the gateway. The broker-router component is
    deployed automatically when an MCPGatewayExtension is reconciled.
  displayName: MCP Gateway
  icon:
    - base64data: 
      mediatype: image/png
  install:
    spec:
      clusterPermissions:
        - rules:
            - apiGroups:
                - ""
              resources:
                - namespaces
              verbs:
                - get
            - apiGroups:
                - ""
              resources:
                - secrets
                - serviceaccounts
                - services
              verbs:
                - create
                - delete
                - get
                - list
                - update
                - watch
            - apiGroups:
                - apps
              resources:
                - deployments
              verbs:
                - create
                - delete
                - get
                - list
                - update
                - watch
            - apiGroups:
                - gateway.networking.k8s.io
              resources:
                - gateways
              verbs:
                - get
                - list
                - watch
            - apiGroups:
                - gateway.networking.k8s.io
              resources:
                - gateways/status
              verbs:
                - get
                - update
            - apiGroups:
                - gateway.networking.k8s.io
              resources:
                - httproutes
              verbs:
                - create
                - delete
                - get
                - list
                - update
                - watch
            - apiGroups:
                - gateway.networking.k8s.io
              resources:
                - httproutes/status
              verbs:
                - update
            - apiGroups:
                - gateway.networking.k8s.io
              resources:
                - referencegrants
              verbs:
                - list
                - watch
            - apiGroups:
                - mcp.kuadrant.io
              resources:
                - mcpgatewayextensions
                - mcpserverregistrations
                - mcpvirtualservers
              verbs:
                - get
                - list
                - update
                - watch
            - apiGroups:
                - mcp.kuadrant.io
              resources:
                - mcpgatewayextensions/finalizers
                - mcpvirtualservers/finalizers
              verbs:
                - update
            - apiGroups:
                - mcp.kuadrant.io
              resources:
                - mcpgatewayextensions/status
                - mcpserverregistrations/status
                - mcpvirtualservers/status
              verbs:
                - get
                - update
            - apiGroups:
                - networking.istio.io
              resources:
                - envoyfilters
              verbs:
                - create
                - delete
                - get
                - list
                - update
                - watch
          serviceAccountName: mcp-controller
      deployments:
        - label:
            app: mcp-controller
            component: controller
          name: mcp-gateway-controller
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: mcp-controller
                component: controller
            strategy: {}
            template:
              metadata:
                labels:
                  app: mcp-controller
                  component: controller
              spec:
                containers:
                  - command:
                      - ./mcp_controller
                      - --log-level=0
                    env:
                      - name: RELATED_IMAGE_ROUTER_BROKER
                        value: ghcr.io/kuadrant/mcp-gateway:latest
                    image: ghcr.io/kuadrant/mcp-controller:latest
                    imagePullPolicy: IfNotPresent
                    livenessProbe:
                      httpGet:
                        path: /healthz
                        port: 8081
                      initialDelaySeconds: 10
                      periodSeconds: 30
                    name: mcp-controller
                    ports:
                      - containerPort: 8081
                        name: health
                        protocol: TCP
                      - containerPort: 8082
                        name: metrics
                        protocol: TCP
                    readinessProbe:
                      httpGet:
                        path: /readyz
                        port: 8081
                      initialDelaySeconds: 5
                      periodSeconds: 10
                    resources:
                      limits:
                        cpu: 200m
                        memory: 256Mi
                      requests:
                        cpu: 50m
                        memory: 64Mi
                serviceAccountName: mcp-controller
    strategy: deployment
  installModes:
    - supported: true
      type: OwnNamespace
    - supported: true
      type: SingleNamespace
    - supported: false
      type: MultiNamespace
    - supported: true
      type: AllNamespaces
  keywords:
    - mcp
    - gateway
    - model-context-protocol
    - envoy
    - kubernetes
  links:
    - name: MCP Gateway
      url: https://github.com/Kuadrant/mcp-gateway
    - name: Documentation
      url: https://github.com/Kuadrant/mcp-gateway/tree/main/docs
  maintainers:
    - email: mcp-gateway@kuadrant.io
      name: Kuadrant
  maturity: preview
  minKubeVersion: 1.28.0
  provider:
    name: Kuadrant
    url: https://kuadrant.io
  relatedImages:
    - image: ghcr.io/kuadrant/mcp-gateway:latest
      name: router-broker
  version: 0.0.0
